<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HTB Writeups</title>
  <style>
    body {
      display: flex;
      margin: 0;
      font-family: sans-serif;
    }
    aside {
      width: 250px;
      background: #111;
      color: white;
      padding: 10px;
      height: 100vh;
      overflow-y: auto;
    }
    main {
      flex: 1;
      padding: 20px;
      background: #f5f5f5;
      overflow-y: auto;
    }
    .item {
      padding: 8px;
      cursor: pointer;
    }
    .item:hover {
      background: #333;
    }
  </style>
</head>
<body>

<aside>
  <h3>Writeups</h3>
</aside>

<main>
  <h2>Select a machine</h2>
</main>

<script>
fetch("writeups.json")
  .then(res => res.json())
  .then(data => {
    const sidebar = document.querySelector("aside");
    const main = document.querySelector("main");

    data.forEach(w => {
      const item = document.createElement("div");
      item.className = "item";
      item.textContent = `${w.name} (${w.os} - ${w.difficulty})`;

      item.onclick = () => {
        fetch(w.path)
          .then(r => r.text())
          .then(md => {
            main.innerText = md;
          });
      };

      sidebar.appendChild(item);
    });
  });
</script>

</body>
</html>
