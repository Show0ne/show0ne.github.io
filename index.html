<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HTB Writeups</title>
  <style>
    body {
      display: flex;
      margin: 0;
      font-family: sans-serif;
    }
    aside {
      width: 250px;
      background: #111;
      color: white;
      padding: 10px;
      height: 100vh;
      overflow-y: auto;
    }
    main {
      flex: 1;
      padding: 20px;
      background: #f5f5f5;
      overflow-y: auto;
    }
    .item {
      padding: 8px;
      cursor: pointer;
    }
    .item:hover {
      background: #333;
    }
  </style>
</head>
<body>

<aside>
  <h3>Writeups</h3>
</aside>

<main>
  <h2>Select a machine</h2>
</main>

<script>
fetch("writeups.json")
  .then(res => res.json())
  .then(data => {
    console.log("DATA:", data);

    // Forzar selección segura
    let sidebar = document.querySelector("aside");

    // Si no existe, lo creamos (clave)
    if (!sidebar) {
      sidebar = document.createElement("aside");
      sidebar.style.width = "250px";
      sidebar.style.background = "#111";
      sidebar.style.color = "white";
      sidebar.style.padding = "10px";
      sidebar.style.height = "100vh";
      sidebar.style.overflowY = "auto";
      document.body.prepend(sidebar);
    }

    const main = document.querySelector("main") || document.body;

    data.forEach(w => {
      const item = document.createElement("div");
      item.textContent = w.name;
      item.style.padding = "8px";
      item.style.cursor = "pointer";

      item.onclick = () => {
        fetch(w.path)
          .then(r => r.text())
          .then(md => {
            main.innerText = md;
          });
      };

      sidebar.appendChild(item);
    });
  })
  .catch(err => console.error("ERROR:", err));
</script>

</body>
</html>
