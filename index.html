<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HTB Writeups</title>

  <!-- Markdown parser -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- Highlight.js -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js/styles/github-dark.css">
  <script src="https://cdn.jsdelivr.net/npm/highlight.js/lib/highlight.min.js"></script>

  <style>
    body {
      display: flex;
      margin: 0;
      font-family: sans-serif;
    }

    aside {
      width: 260px;
      background: #0d1117;
      color: white;
      padding: 15px;
      height: 100vh;
      overflow-y: auto;
      border-right: 1px solid #222;
    }

    aside h3 {
      margin-top: 0;
      color: #58a6ff;
    }

    main {
      flex: 1;
      padding: 30px;
      background: #0d1117;
      color: #c9d1d9;
      overflow-y: auto;
      font-family: monospace;
    }

    .item {
      padding: 8px;
      cursor: pointer;
      border-bottom: 1px solid #222;
    }

    .item:hover {
      background: #161b22;
    }

    .debug {
      color: red;
      font-size: 12px;
      margin-top: 10px;
      white-space: pre-line;
    }

    pre {
      background: #161b22;
      padding: 10px;
      overflow-x: auto;
      border-radius: 6px;
    }

    code {
      color: #c9d1d9;
    }

    h1, h2, h3 {
      color: #58a6ff;
    }
  </style>
</head>

<body>

<aside>
  <h3>Writeups</h3>
  <div id="list"></div>
  <div id="debug" class="debug"></div>
</aside>

<main id="content">
  <h2>Select a machine</h2>
</main>

<script>
const debug = document.getElementById("debug");

function log(msg) {
  console.log(msg);
  debug.innerText += msg + "\\n";
}

// 🔥 carga JSON correctamente
fetch("/writeups.json?v=" + Date.now())
  .then(res => {
    log("HTTP status: " + res.status);
    if (!res.ok) throw new Error("writeups.json NOT FOUND");
    return res.json();
  })
  .then(data => {
    log("JSON loaded OK");

    const list = document.getElementById("list");
    const content = document.getElementById("content");

    list.innerHTML = "";

    data.forEach(w => {
      const item = document.createElement("div");
      item.className = "item";
      item.textContent = `${w.name} (${w.os} - ${w.difficulty})`;

      item.onclick = () => {
        log("Loading: " + w.path);

        fetch(w.path + "?v=" + Date.now())
          .then(r => {
            log("MD status: " + r.status);
            if (!r.ok) throw new Error("MD fetch failed");
            return r.text();
          })
          .then(md => {
            content.innerHTML = marked.parse(md);

            // 🔥 syntax highlighting
            document.querySelectorAll('pre code').forEach((block) => {
              hljs.highlightElement(block);
            });
          })
          .catch(err => {
            log("ERROR loading MD");
            console.error(err);
          });
      };

      list.appendChild(item);
    });
  })
  .catch(err => {
    log("ERROR loading JSON");
    console.error(err);
  });
</script>

</body>
</html>
