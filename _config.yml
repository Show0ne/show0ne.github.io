# The Site Configuration

# Import the theme
theme: jekyll-theme-chirpy

lang: es
timezone: Europe/Madrid

# jekyll-seo-tag settings
title: Show@Hack4u~
tagline: HTB Writeups · Reverse Engineering · CTF
description: >-
  Cybersecurity, reverse engineering y writeups de HackTheBox por Show@Hack4u~

url: "https://show0ne.github.io"

github:
  username: Show0ne

social:
  name: Show
  email: ""
  links:
    - https://github.com/Show0ne

theme_mode: dark
avatar: ""
toc: true
paginate: 10

comments:
  active: ""

analytics:
  google:
    id: ""

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    block:
      line_numbers: true
      start_line: 1

permalink: /posts/:title/

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false
      toc: true
  - scope:
      path: "_tabs"
      type: tabs
    values:
      layout: page
      permalink: /:title/

plugins:
  - jekyll-include-cache
